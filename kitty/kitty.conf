# FONT
font_size 12.0
font_family      CaskaydiaCove Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

# PERFORMANCE
repaint_delay 10
input_delay 3
sync_to_monitor yes

# LAYOUT
# remember_window_size  yes
# initial_window_width  960
# initial_window_height 1052
# window_padding_width 0

# APPEARANCE
hide_window_decorations yes
background_opacity .9

# THEME
include ./theme.conf

# GENERAL
shell fish
editor nvim
copy_on_select yes

# MAPPINGS
  # map key combine : action1 : action2 : action3 ...
map alt+enter new_window
map alt+d close_window
map alt+c  copy_to_clipboard
map alt+v paste_from_selection
map alt+shift+j neighboring_window down
map alt+shift+k neighboring_window up

# MOUSE
copy_on_select yes


# TAB BAR
tab_bar_min_tabs 2
tab_bar_margin_width 4
tab_bar_style powerline
tab_powerline_style angled
  #OR round, slanted
# tab_title_max_length 12
tab_title_template "{index}"
  #AND {fmt.fg.red}{bell_symbol}{activity_symbol}
tab_bar_background none
active_tab_foreground   #000
active_tab_background   #eee
active_tab_font_style   bold-italic
inactive_tab_foreground #444
inactive_tab_background #999
inactive_tab_font_style normal

# kanagawa color theme
include kanagawa-kitty.conf
